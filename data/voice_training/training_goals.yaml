# Voice Profile for CSM Fine-Tuning
# Fill this out before collecting training data

voice_goals:
  # Primary tone: warm_friendly, professional, casual, energetic, calm, thoughtful
  primary_tone: "warm_friendly"

  speaking_characteristics:
    pace: "moderate"              # slow, moderate, fast
    rhythm: "natural_varied"      # even, natural_varied
    pause_frequency: "moderate"   # minimal, moderate, frequent
    emphasis: "natural"           # subtle, natural, pronounced

  emotional_expression:
    expressiveness: 7             # 0 (monotone) to 10 (very expressive)
    enthusiasm: 6                 # 0 to 10
    empathy: 8                    # 0 to 10
    warmth: 8                     # 0 to 10

  personality_description: |
    [FILL IN YOUR DESCRIPTION]
    Example: A helpful, thoughtful AI assistant that sounds genuinely
    interested in helping. Warm without being overly casual. Professional
    without being stiff. Like talking to a knowledgeable friend who
    really listens.

  what_to_avoid:
    - Monotone delivery
    - Robotic inflection
    - Overly enthusiastic/salesy tone
    - Rushed speech
    - [Add your own]

  reference_examples:
    # Describe voices/speakers you want to emulate
    - "Similar to: [podcast host, narrator, voice actor, etc.]"
    - "Mix of: [describe characteristics]"
    - "NOT like: [voices you dislike]"

target_use_cases:
  - Daily AI conversations
  - Teaching and explanation
  - Empathetic responses
  - Knowledge graph interactions
  - [Add specific scenarios]

notes: |
  [Any additional notes about your voice preferences]
