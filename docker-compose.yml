# MIST.AI Backend Stack (production)
# Usage: docker compose up -d
# Dev mode: docker-compose.override.yml adds volume mounts automatically
services:
  mist-backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: mist-backend
    ports:
      - "8001:8001"
    environment:
      - NEO4J_URI=bolt://mist-neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
      - LLM_SERVER_URL=http://mist-llm:8080
      - LLM_BACKEND=llamacpp
      - MODEL=${MODEL:-gemma-4-e4b}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-1.0}
      - EVENT_STORE_DB_PATH=/app/data/event_store.db
      - EVENT_STORE_AUDIO_DIR=/app/data/audio
      - VECTOR_STORE_DATA_DIR=/app/data/vector_store
      # Cluster 8 / ADR-010: vault layer + sidecar index. Container paths align
      # with the bind mounts below. Filewatcher observer_type left "auto"
      # (resolves to inotify on this Linux container).
      - MIST_VAULT_ROOT=/app/mist-memory
      - MIST_SIDECAR_DB_PATH=/app/data/vault_sidecar.db
      - TTS_ENABLED=${TTS_ENABLED:-true}
      - TTS_ENGINE=${TTS_ENGINE:-chatterbox}
      - TTS_EXAGGERATION=${TTS_EXAGGERATION:-0.5}
      - TTS_TEMPERATURE=${TTS_TEMPERATURE:-0.8}
      - TTS_CFG_WEIGHT=${TTS_CFG_WEIGHT:-0.5}
      - VOICE_PROFILE=${VOICE_PROFILE:-friday}
      - ENABLE_KNOWLEDGE_INTEGRATION=${ENABLE_KNOWLEDGE_INTEGRATION:-true}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      # Cluster 8 / ADR-010: vault bind mount. Host path overridable via
      # VAULT_HOST_PATH; default ./mist-memory at repo root.
      - ${VAULT_HOST_PATH:-./mist-memory}:/app/mist-memory
      - mist-hf-cache:/root/.cache/huggingface
      - mist-torch-cache:/root/.cache/torch
    depends_on:
      mist-neo4j:
        condition: service_healthy
      mist-llm:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  mist-neo4j:
    image: neo4j:5
    container_name: mist-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - mist-neo4j-data:/data
      - mist-neo4j-logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mist-llm:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: mist-llm
    ports:
      - "8080:8080"
    volumes:
      - ${MODELS_DIR:-./models}:/models:ro
      - ./config/system_prompt.txt:/config/system_prompt.txt:ro
    # Model + server config selected via the 2026-04-16 Gemma 4 exoneration
    # gauntlet. Winner: gemma-4-E4B-it Q5_K_M dense + carteakey-full joint
    # recipe. Hermes-4 technically edged V2 on the pre-registered rule but
    # Gemma passed V1 production gate, matched V2 within noise, dominated
    # V4 speed (83.5 vs 35.7 t/s) and won adversarial robustness at p<0.0001.
    # See knowledge-vault/Decisions/ADR-008-revised-model-backend-selection.md
    environment:
      - LLAMA_ARG_MODEL=/models/${LLM_MODEL_FILE:-unsloth/gemma-4-E4B-it-Q5_K_M.gguf}
      - LLAMA_ARG_N_GPU_LAYERS=999
      - LLAMA_ARG_CTX_SIZE=${LLM_CTX_SIZE:-32768}
      - LLAMA_ARG_FLASH_ATTN=on
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
      - LLAMA_ARG_THREADS=10
      - LLAMA_ARG_THREADS_BATCH=12
      - LLAMA_ARG_BATCH_SIZE=1024
      - LLAMA_ARG_UBATCH_SIZE=512
      - LLAMA_ARG_N_PARALLEL=1
      - LLAMA_ARG_METRICS=1
      - LLAMA_ARG_CACHE_TYPE_K=q8_0
      - LLAMA_ARG_CACHE_TYPE_V=q8_0
      - LLAMA_ARG_JINJA=1
    # Sampling defaults that don't map to LLAMA_ARG_ envvars. Applied at
    # server level when the request doesn't override. Per-request
    # overrides from backend/llm/LlamaServerProvider take precedence.
    command:
      - "--no-kv-unified"
      - "--no-webui"
      - "--temp"
      - "1.0"
      - "--top-p"
      - "0.95"
      - "--top-k"
      - "64"
      - "--min-p"
      - "0.0"
      - "--repeat-penalty"
      - "1.0"
      - "--seed"
      - "3407"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  mist-neo4j-data:
  mist-neo4j-logs:
  mist-hf-cache:
  mist-torch-cache:
