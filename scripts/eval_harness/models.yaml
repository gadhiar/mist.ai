# MIST model backend A/B evaluation candidates.
#
# Each candidate describes how the harness should talk to a single
# llama-server instance serving that model. The harness may either
# connect to an externally-started server (--external) or spawn one
# per-candidate as a subprocess (default).
#
# Source of truth for the candidate list:
#   Decisions/ADR-008-revised-model-backend-selection.md (Phase 1.5 amended)
#   Projects/mist-ai/research/2026-04-11-model-backend-cross-validation.md
#
# Spec corrections baked in (per cross-validation research Section 6):
#   1. No --system-prompt-file (removed upstream Oct 2024, PR #9857).
#   2. Base image pinned to CUDA 12.8.1 (applies to containerized runs).
#   3. --no-kv-unified added for correctness under KV quantization
#      (flag became boolean in llama.cpp >= b8700; was --kv-unified 0 pre-b8700).
#   4. GBNF grammar passed via extra_body.grammar, not --grammar-file.
#   5. Speculative decoding dropped from baseline (Nemotron only has 0.5B draft).
#   6. --cache-ram 4096 (the real flag), not --cram 256.
#
# llama.cpp build pin: >= b8670 (required for Gemma 4 MoE support).

defaults:
  # Server endpoint the harness connects to.
  base_url: "http://127.0.0.1:8080"

  # Where GGUFs live locally. Override via LLAMA_MODELS_DIR env var.
  models_dir: "D:/Users/rajga/models"

  # llama-server binary lookup. Override via LLAMA_SERVER_BIN env var
  # or --llama-server-bin CLI flag.
  llama_server_binary: "llama-server"

  # Shared server flags applied to every candidate unless overridden.
  shared_server_args:
    - "--host"
    - "127.0.0.1"
    - "--port"
    - "8080"
    - "--n-gpu-layers"
    - "999"
    - "--cache-ram"
    - "4096"
    - "--no-kv-unified"
    - "--no-webui"

  # Default context window for the harness.
  ctx_size: 8192

  # How long to wait for /health to become ready after spawn (seconds).
  spawn_health_timeout_seconds: 120

  # Per-request timeout (seconds).
  request_timeout_seconds: 180

  # API key placeholder (llama-server does not require one).
  api_key: "not-needed"

