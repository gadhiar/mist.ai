name: Python Code Quality

on:
  push:
    branches: [main, feat/**, dev/**]
    paths:
      - 'backend/**'
      - 'scripts/**'
      - '**.py'
      - 'requirements.txt'
      - 'pyproject.toml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'scripts/**'
      - '**.py'
      - 'requirements.txt'
      - 'pyproject.toml'

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black ruff mypy bandit[toml] codespell

      - name: Check code formatting with Black
        run: |
          black --check backend/ scripts/
          if [ $? -ne 0 ]; then
            echo "Code is not formatted. Run: black backend/ scripts/"
            exit 1
          fi

      - name: Lint with Ruff
        run: |
          ruff check backend/ scripts/
          if [ $? -ne 0 ]; then
            echo "Linting issues found. Run: ruff check backend/ scripts/ --fix"
            exit 1
          fi

      - name: Type check with mypy (optional, continue on error)
        run: |
          mypy backend/ || echo "Type checking found issues (non-blocking)"
        continue-on-error: true

      - name: Security scan with Bandit
        run: |
          bandit -c pyproject.toml -r backend/ scripts/
          if [ $? -ne 0 ]; then
            echo "Security issues found. Review output above."
            exit 1
          fi

      - name: Spell check with codespell
        run: |
          codespell --skip="*.git,*.venv,venv,*.pyc,*.egg-info,*.lock,mist_desktop,dependencies" --ignore-words-list="crate,nd,te,thre,hass,bloc,lod"
          if [ $? -ne 0 ]; then
            echo "Spelling errors found. Review output above."
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    if: false  # Disabled until tests are added
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/ -v --cov=backend --cov-report=term-missing
